<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <title>360 Panorama Viewer</title>
 <style>
   body { margin: 0; overflow: hidden; }
   canvas { display: block; }
   #controls { position: absolute; top: 10px; left: 10px; z-index: 10; }
   #controls button.small-toggle {
     font-size: 10px;
     padding: 2px 5px;
     margin-left: 5px;
   }
   #imageLabel {
     position: absolute;
     bottom: 10px;
     left: 10px;
     background: rgba(0,0,0,0.7);
     color: #fff;
     padding: 3px 6px;
     font-size: 11px;
     border-radius: 3px;
     display: none;
     z-index: 20;
     font-family: sans-serif;
     opacity: 0;
   }
   #autoStatus, #invertStatus {
     display: inline-block;
     margin-left: 8px;
     font-size: 11px;
     font-family: sans-serif;
     color: #fff;
     background: rgba(0,0,0,0.6);
     padding: 2px 6px;
     border-radius: 3px;
   }
   #controls label { color: #fff; font-family: sans-serif; margin-left: 10px; }
   #controls button { margin-left: 5px; }
 </style>
</head>
<body>
 <div id="controls">
   <div id="controlButtons">
     <input type="file" id="fileInput" accept="image/*" multiple>
     <label><input type="radio" name="viewerMode" value="regular" checked> Regular Panorama</label>
     <label><input type="radio" name="viewerMode" value="stereograph"> Stereograph Split</label>
     <label><input type="radio" name="splitMode" value="horizontal" checked> Left/Right split</label>
     <label><input type="radio" name="splitMode" value="vertical"> Top/Bottom split</label>
     <button onclick="selectHalf('first')">Use First Half</button>
     <button onclick="selectHalf('second')">Use Second Half</button>
     <button onclick="setMode('equirectangular')">Sphere</button>
     <button onclick="setMode('cubemap')">Cube Map</button>
     <button onclick="resetView()">Reset View</button>
     <button onclick="prevImage()">Prev</button>
     <button onclick="nextImage()">Next</button>
     <select id="autoDelay">
       <option value="5000">5s</option>
       <option value="10000">10s</option>
       <option value="15000">15s</option>
       <option value="20000">20s</option>
       <option value="25000">25s</option>
       <option value="30000">30s</option>
       <option value="60000">1m</option>
     </select>
     <button onclick="toggleAutoPlay()">Auto Play</button>
     <span id="autoStatus">OFF</span>
     <button onclick="toggleInvert()">Invert Controls</button>
     <span id="invertStatus">Normal</span>
     <button onclick="toggleFullscreen()">Fullscreen</button>
     <select id="qualitySelect">
       <option value="max">Maximum Quality</option>
       <option value="medium" selected>Medium Quality</option>
       <option value="low">Low Quality</option>
     </select>
     <button onclick="takeScreenshot()">Screenshot</button>
   </div>
   <button class="small-toggle" onclick="toggleControls()">☰</button>
 </div>

 <div id="imageLabel"></div>

 <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
 <script>
   const scene = new THREE.Scene();
   const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
   // Preserve buffer so screenshots work
   const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
   renderer.setSize(window.innerWidth, window.innerHeight);
   renderer.outputEncoding = THREE.sRGBEncoding;
   document.body.appendChild(renderer.domElement);

   let mesh, mode = 'equirectangular';
   let galleryItems = [];
   let currentIndex = -1;
   let autoPlayTimer = null;
   let currentImage = null;
   let splitMode = "horizontal";
   let viewerMode = "regular";
   let selectedHalf = null;

   const imageLabel = document.getElementById('imageLabel');
   const autoStatus = document.getElementById('autoStatus');
   const invertStatus = document.getElementById('invertStatus');

   let invertControls = false;

   function toggleInvert() {
     invertControls = !invertControls;
     invertStatus.textContent = invertControls ? "Inverted" : "Normal";
   }

   document.addEventListener('keydown', (event) => {
     if (event.key.toLowerCase() === 'i') toggleInvert();
   });

   document.querySelectorAll("input[name='splitMode']").forEach(radio => {
     radio.addEventListener("change", e => splitMode = e.target.value);
   });
   document.querySelectorAll("input[name='viewerMode']").forEach(radio => {
     radio.addEventListener("change", e => viewerMode = e.target.value);
   });

   function applyQuality(texture) {
     const quality = document.getElementById('qualitySelect').value;
     if (quality === "max") {
       texture.magFilter = THREE.LinearFilter;
       texture.minFilter = THREE.LinearMipMapLinearFilter;
       texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
     } else if (quality === "medium") {
       texture.magFilter = THREE.LinearFilter;
       texture.minFilter = THREE.LinearFilter;
       texture.anisotropy = Math.floor(renderer.capabilities.getMaxAnisotropy() / 2);
     } else {
       texture.magFilter = THREE.NearestFilter;
       texture.minFilter = THREE.NearestFilter;
       texture.anisotropy = 1;
     }
   }

   function getHalfTexture(img, mode, which) {
     const canvas = document.createElement("canvas");
     const ctx = canvas.getContext("2d");
     if (mode === "horizontal") {
       canvas.width = img.width / 2;
       canvas.height = img.height;
       ctx.drawImage(img, which === "first" ? 0 : img.width/2, 0, img.width/2, img.height, 0, 0, img.width/2, img.height);
     } else {
       canvas.width = img.width;
       canvas.height = img.height / 2;
       ctx.drawImage(img, 0, which === "first" ? 0 : img.height/2, img.width, img.height/2, 0, 0, img.width, img.height/2);
     }
     const texture = new THREE.CanvasTexture(canvas);
     texture.encoding = THREE.sRGBEncoding;
     applyQuality(texture);
     return texture;
   }

   document.getElementById('fileInput').addEventListener('change', function(event) {
     galleryItems = [];
     const files = event.target.files;
     if (!files.length) return;
     for (let i = 0; i < files.length; i++) {
       const file = files[i];
       const url = URL.createObjectURL(file);
       if (viewerMode === "regular") {
         galleryItems.push({ name: file.name, url });
         if (currentIndex === -1) {
           currentIndex = 0;
           loadTexture(galleryItems[currentIndex].url, galleryItems[currentIndex].name);
         }
       } else {
         const img = new Image();
         img.onload = () => {
           currentImage = img;
           galleryItems.push({ name: file.name, img });
           if (currentIndex === -1) currentIndex = 0;
         };
         img.src = url;
       }
     }
   });

   function selectHalf(which) {
     if (!currentImage) return;
     selectedHalf = which;
     const texture = getHalfTexture(currentImage, splitMode, which);
     applyTexture(texture, currentImage.name + " (" + which + ")");
   }

   function prevImage() {
     if (galleryItems.length === 0) return;
     currentIndex = (currentIndex - 1 + galleryItems.length) % galleryItems.length;
     if (viewerMode === "regular") {
       loadTexture(galleryItems[currentIndex].url, galleryItems[currentIndex].name);
     } else {
       currentImage = galleryItems[currentIndex].img;
       if (selectedHalf) selectHalf(selectedHalf);
       else selectHalf("first");
     }
   }

   function nextImage() {
     if (galleryItems.length === 0) return;
     currentIndex = (currentIndex + 1) % galleryItems.length;
     if (viewerMode === "regular") {
       loadTexture(galleryItems[currentIndex].url, galleryItems[currentIndex].name);
     } else {
       currentImage = galleryItems[currentIndex].img;
       if (selectedHalf) {
         selectHalf(selectedHalf);
       } else {
         selectHalf("first"); // default if none chosen
       }
     }
   }

   function setMode(projection) {
     mode = projection;
     if (mesh) scene.remove(mesh);
     scene.background = null;
   }

   function applyTexture(texture, name) {
     if (mesh) scene.remove(mesh);
     if (mode === 'equirectangular') {
       const geometry = new THREE.SphereGeometry(500, 128, 128);
       geometry.scale(-1, 1, 1);
       const material = new THREE.MeshBasicMaterial({ map: texture });
       mesh = new THREE.Mesh(geometry, material);
       scene.add(mesh);
     } else if (mode === 'cubemap') {
       const cubeRenderTarget = new THREE.WebGLCubeRenderTarget(2048, { format: THREE.RGBAFormat });
       cubeRenderTarget.fromEquirectangularTexture(renderer, texture);
       scene.background = cubeRenderTarget.texture;
     }
     showImageLabel(name);
   }

   function loadTexture(src, name) {
     const textureLoader = new THREE.TextureLoader();
     textureLoader.load(src, function(texture) {
       texture.encoding = THREE.sRGBEncoding;
       applyQuality(texture);
       applyTexture(texture, name);
     });
   }

   function showImageLabel(name) {
     imageLabel.textContent = name;
     imageLabel.style.display = 'block';
     imageLabel.style.opacity = '1';
     imageLabel.style.transition = 'none';
     setTimeout(() => {
       imageLabel.style.transition = 'opacity 1s';
       imageLabel.style.opacity = '0';
       setTimeout(() => {
         imageLabel.style.display = 'none';
         imageLabel.style.transition = '';
       }, 1000);
     }, 2000);
   }

   function resetView() {
     lon = 0;
     lat = 0;
     camera.fov = 75;
     camera.updateProjectionMatrix();
   }

   function toggleControls() {
     const controlButtons = document.getElementById('controlButtons');
     controlButtons.style.display = (controlButtons.style.display === 'none') ? 'block' : 'none';
   }

   function toggleAutoPlay() {
     if (autoPlayTimer) {
       clearInterval(autoPlayTimer);
       autoPlayTimer = null;
       autoStatus.textContent = "OFF";
     } else {
       const delay = parseInt(document.getElementById('autoDelay').value, 10);
       autoPlayTimer = setInterval(() => {
         nextImage();
       }, delay);
       autoStatus.textContent = "ON";
     }
   }

   function toggleFullscreen() {
     if (!document.fullscreenElement) {
       document.documentElement.requestFullscreen();
     } else {
       if (document.exitFullscreen) document.exitFullscreen();
     }
   }

   // Screenshot capture (fixed)
   function takeScreenshot() {
     // Force render before capture
     renderer.render(scene, camera);

     const dataURL = renderer.domElement.toDataURL("image/png");
     const link = document.createElement("a");
     link.href = dataURL;
     link.download = "screenshot_" + Date.now() + ".png";
     document.body.appendChild(link);
     link.click();
     document.body.removeChild(link);
   }

   // Interaction controls
   let isUserInteracting = false, lon = 0, lat = 0, phi = 0, theta = 0;
   let touchX, touchY, touchDistance = 0;

   document.addEventListener('mousedown', () => isUserInteracting = true);
   document.addEventListener('mouseup', () => isUserInteracting = false);
   document.addEventListener('mousemove', (event) => {
     if (isUserInteracting) {
       lon += (invertControls ? -event.movementX : event.movementX) * 0.1;
       lat += (invertControls ? event.movementY : -event.movementY) * 0.1;
     }
   });

   // Extra keyboard camera controls (WASD + QEZC)
   document.addEventListener('keydown', (event) => {
    switch (event.key.toLowerCase()) {
      // WASD for tilt/pan
      case 'w': // tilt up
        lat += 2;
        break;
      case 's': // tilt down
        lat -= 2;
        break;
      case 'a': // pan left
        lon -= 2;
        break;
      case 'd': // pan right
        lon += 2;
        break;

      // QEZC for diagonals
      case 'q': // left + up
        lon -= 2;
        lat += 2;
        break;
      case 'e': // right + up
        lon += 2;
        lat += 2;
        break;
      case 'z': // left + down
        lon -= 2;
        lat -= 2;
        break;
      case 'c': // right + down
        lon += 2;
        lat -= 2;
        break;

       // 1 and 2 for zoom
       case '1': // zoom in
         camera.fov = Math.max(30, camera.fov - 2); // limit min FOV
         camera.updateProjectionMatrix();
         break;
       case '2': // zoom out
         camera.fov = Math.min(100, camera.fov + 2); // limit max FOV
         camera.updateProjectionMatrix();
         break;
     }
   });

   // Unlimited zoom
   document.addEventListener('wheel', (event) => {
     camera.fov += event.deltaY * 0.05;
     camera.updateProjectionMatrix();
   });

   document.addEventListener('touchstart', (event) => {
     if (event.touches.length === 1) {
       isUserInteracting = true;
       touchX = event.touches[0].pageX;
       touchY = event.touches[0].pageY;
     } else if (event.touches.length === 2) {
       const dx = event.touches[0].pageX - event.touches[1].pageX;
       const dy = event.touches[0].pageY - event.touches[1].pageY;
       touchDistance = Math.sqrt(dx*dx + dy*dy);
     }
   });

   document.addEventListener('touchmove', (event) => {
     if (isUserInteracting && event.touches.length === 1) {
       lon += (invertControls ? -(event.touches[0].pageX - touchX) : (event.touches[0].pageX - touchX)) * 0.1;
       lat += (invertControls ? (event.touches[0].pageY - touchY) : -(event.touches[0].pageY - touchY)) * 0.1;
       touchX = event.touches[0].pageX;
       touchY = event.touches[0].pageY;
     } else if (event.touches.length === 2) {
       const dx = event.touches[0].pageX - event.touches[1].pageX;
       const dy = event.touches[0].pageY - event.touches[1].pageY;
       const newDistance = Math.sqrt(dx*dx + dy*dy);
       const delta = newDistance - touchDistance;
       camera.fov -= delta * 0.05;
       camera.updateProjectionMatrix();
       touchDistance = newDistance;
     }
   });

   document.addEventListener('touchend', () => isUserInteracting = false);

   // Animation loop
   function animate() {
     requestAnimationFrame(animate);
     lat = Math.max(-85, Math.min(85, lat));
     phi = THREE.MathUtils.degToRad(90 - lat);
     theta = THREE.MathUtils.degToRad(lon);

     camera.target = new THREE.Vector3(
       500 * Math.sin(phi) * Math.cos(theta),
       500 * Math.cos(phi),
       500 * Math.sin(phi) * Math.sin(theta)
     );
     camera.lookAt(camera.target);
     renderer.render(scene, camera);
   }
   animate();

   window.addEventListener('resize', () => {
     camera.aspect = window.innerWidth / window.innerHeight;
     camera.updateProjectionMatrix();
     renderer.setSize(window.innerWidth, window.innerHeight);
   });
 </script>
</body>
</html>
