<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>360 Panorama Viewer (High Quality)</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
    #controls { position: absolute; top: 10px; left: 10px; z-index: 10; }
    #info { position:absolute;bottom:10px;left:10px;
            background:rgba(0,0,0,0.5);color:#fff;padding:5px;
            font-family:sans-serif;z-index:10; }
  </style>
</head>
<body>
  <div id="controls">
    <input type="file" id="fileInput" accept="image/*">
    <button onclick="setMode('equirectangular')">Sphere</button>
    <button onclick="setMode('cubemap')">Cube Map</button>
    <button onclick="resetView()">Reset View</button>
    <button onclick="saveAsJPG()">Save as JPG</button>
    <button onclick="saveAsPNG()">Save as PNG</button>
  </div>
  <div id="info"></div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputEncoding = THREE.sRGBEncoding; // correct color output
    document.body.appendChild(renderer.domElement);

    let mesh, mode = 'equirectangular';
    let lastFile = null;

    document.getElementById('fileInput').addEventListener('change', function(event) {
      lastFile = event.target.files[0];
      if (!lastFile) return;
      processFile(lastFile);
    });

    function setMode(projection) {
      mode = projection;
      if (mesh) scene.remove(mesh);
      scene.background = null;
      if (lastFile) processFile(lastFile);
    }

    function processFile(file) {
      const url = URL.createObjectURL(file);
      loadTexture(url, true);
    }

    function loadTexture(src, revoke=false) {
      const textureLoader = new THREE.TextureLoader();
      textureLoader.load(src, function(texture) {
        // High-quality color + sharpness
        texture.encoding = THREE.sRGBEncoding;
        texture.minFilter = THREE.LinearFilter;
        texture.magFilter = THREE.LinearFilter;
        texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
        texture.generateMipmaps = true;

        const maxSize = renderer.capabilities.maxTextureSize;
        const width = texture.image.width;
        const height = texture.image.height;
        document.getElementById('info').textContent =
          `Loaded texture: ${width}×${height}, GPU limit: ${maxSize}×${maxSize}`;

        if (mode === 'equirectangular') {
          if (mesh) scene.remove(mesh);
          const geometry = new THREE.SphereGeometry(500, 128, 128);
          geometry.scale(-1, 1, 1);
          const material = new THREE.MeshBasicMaterial({ map: texture });
          mesh = new THREE.Mesh(geometry, material);
          scene.add(mesh);
        } else if (mode === 'cubemap') {
          const cubeRenderTarget = new THREE.WebGLCubeRenderTarget(2048, { format: THREE.RGBAFormat });
          cubeRenderTarget.fromEquirectangularTexture(renderer, texture);
          scene.background = cubeRenderTarget.texture;
        }
        if (revoke) URL.revokeObjectURL(src);
      });
    }

    // Export functions
    function saveAsJPG() {
      if (!lastFile) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          const jpgData = canvas.toDataURL('image/jpeg', 1.0); // max quality
          downloadFile(jpgData, lastFile.name.replace(/\.[^/.]+$/, "") + ".jpg");
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(lastFile);
    }

    function saveAsPNG() {
      if (!lastFile) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          const pngData = canvas.toDataURL('image/png');
          downloadFile(pngData, lastFile.name.replace(/\.[^/.]+$/, "") + ".png");
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(lastFile);
    }

    function downloadFile(dataUrl, filename) {
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    // Interaction + zoom
    let isUserInteracting = false, lon = 0, lat = 0, phi = 0, theta = 0;
    let touchX, touchY, touchDistance = 0;

    document.addEventListener('mousedown', () => isUserInteracting = true);
    document.addEventListener('mouseup', () => isUserInteracting = false);
    document.addEventListener('mousemove', (event) => {
      if (isUserInteracting) {
        lon += event.movementX * 0.1;
        lat -= event.movementY * 0.1;
      }
    });

    document.addEventListener('wheel', (event) => {
      camera.fov += event.deltaY * 0.05;
      camera.fov = Math.max(30, Math.min(100, camera.fov));
      camera.updateProjectionMatrix();
    });

    document.addEventListener('touchstart', (event) => {
      if (event.touches.length === 1) {
        isUserInteracting = true;
        touchX = event.touches[0].pageX;
        touchY = event.touches[0].pageY;
      } else if (event.touches.length === 2) {
        const dx = event.touches[0].pageX - event.touches[1].pageX;
        const dy = event.touches[0].pageY - event.touches[1].pageY;
        touchDistance = Math.sqrt(dx*dx + dy*dy);
      }
    });

    document.addEventListener('touchmove', (event) => {
      if (isUserInteracting && event.touches.length === 1) {
        lon += (event.touches[0].pageX - touchX) * 0.1;
        lat -= (event.touches[0].pageY - touchY) * 0.1;
        touchX = event.touches[0].pageX;
        touchY = event.touches[0].pageY;
      } else if (event.touches.length === 2) {
        const dx = event.touches[0].pageX - event.touches[1].pageX;
        const dy = event.touches[0].pageY - event.touches[1].pageY;
        const newDistance = Math.sqrt(dx*dx + dy*dy);
        const delta = newDistance - touchDistance;
        camera.fov -= delta * 0.05;
        camera.fov = Math.max(30, Math.min(100, camera.fov));
        camera.updateProjectionMatrix();
        touchDistance = newDistance;
      }
    });

    document.addEventListener('touchend', () => isUserInteracting = false);

    // Reset view
    function resetView() {
      lon = 0;
      lat = 0;
      camera.fov = 75;
      camera.updateProjectionMatrix();
    }

    function animate() {
      requestAnimationFrame(animate);
      lat = Math.max(-85, Math.min(85, lat));
      phi = THREE.MathUtils.degToRad(90 - lat);
      theta = THREE.MathUtils.degToRad(lon);

      camera.target = new THREE.Vector3(
        500 * Math.sin(phi) * Math.cos(theta),
        500 * Math.cos(phi),
        500 * Math.sin(phi) * Math.sin(theta)
      );
      camera.lookAt(camera.target);
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
